services:
  db:
    # prod: baza NIE jest wystawiona na zewnątrz hosta
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-namesdb}
    restart: always

  backend:
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-namesdb}
      APP_ENV: production
    restart: always

  frontend:
    restart: always
