services:
  db:
    ports:
      - "5432:5432"   # dev: baza widoczna z hosta (np. dla DBeaver)

  backend:
    volumes:
      - ./backend:/app   # montujemy kod — zmiany widoczne bez rebuild
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/namesdb
      APP_ENV: development
